<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monoid</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <!-- Top bar: branding + global actions -->
      <header class="topbar">
        <div class="brand">
          <svg class="brand-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="6" width="3" height="8" rx="1.5" fill="currentColor" opacity="0.5"/>
            <rect x="7" y="3" width="3" height="14" rx="1.5" fill="currentColor"/>
            <rect x="12" y="5" width="3" height="10" rx="1.5" fill="currentColor" opacity="0.7"/>
            <rect x="17" y="7" width="3" height="6" rx="1.5" fill="currentColor" opacity="0.4"/>
          </svg>
          <span class="brand-name">Monoid</span>
          <span class="brand-version" id="app-version"></span>
        </div>
        <div class="topbar-actions">
          <button type="button" id="add-files" class="btn btn-secondary">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Files
          </button>
          <button type="button" id="add-folder" class="btn btn-secondary">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 5V4a1 1 0 011-1h3.5l1.5 2H13a1 1 0 011 1v6a1 1 0 01-1 1H3a1 1 0 01-1-1V5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Folder
          </button>
          <span class="topbar-divider"></span>
          <button type="button" id="toggle-settings" class="btn btn-ghost" title="Settings">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </button>
        </div>
      </header>

      <!-- Collapsible settings panel -->
      <section class="settings-panel" id="settings-panel" hidden>
        <div class="settings-grid">
          <label class="field">
            <span class="field-label">Output Folder</span>
            <div class="field-inline">
              <input type="text" id="output-dir" placeholder="Same as source" />
              <button type="button" id="select-output-dir" class="btn btn-secondary btn-sm">Browse</button>
            </div>
          </label>
          <label class="field">
            <span class="field-label">Filename Template</span>
            <input type="text" id="filename-template" value="{stem}_mono" />
            <small class="field-hint">Use <code>{stem}</code>, <code>{original_ext}</code>, <code>{ext}</code></small>
          </label>
          <label class="field">
            <span class="field-label">Overwrite Policy</span>
            <select id="overwrite-policy">
              <option value="forbid" selected>Fail if output exists</option>
              <option value="overwrite">Overwrite existing</option>
            </select>
          </label>
        </div>
        <div class="settings-toggles">
          <label class="toggle"><input type="checkbox" id="skip-existing" checked /><span>Skip existing outputs</span></label>
          <label class="toggle"><input type="checkbox" id="stop-on-error" /><span>Stop on first error</span></label>
        </div>
      </section>

      <!-- Main content area -->
      <section class="main-content">
        <!-- Drop zone / empty state (shown when queue is empty) -->
        <div class="dropzone" id="dropzone">
          <div class="dropzone-inner">
            <svg class="dropzone-icon" width="48" height="48" viewBox="0 0 48 48" fill="none">
              <path d="M24 8v24M16 24l8 8 8-8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
              <path d="M8 32v6a2 2 0 002 2h28a2 2 0 002-2v-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
            </svg>
            <p class="dropzone-text">Drop audio files here</p>
            <p class="dropzone-hint">or use the buttons above to browse</p>
          </div>
        </div>

        <!-- Queue (shown when files are added) -->
        <div class="queue-container" id="queue-container" hidden>
          <div class="queue-toolbar">
            <div class="queue-info">
              <span class="queue-count" id="queue-caption">0 files</span>
              <span class="queue-status" id="batch-status" data-tone="neutral">Ready</span>
            </div>
            <div class="queue-actions">
              <button type="button" id="clear-queue" class="btn btn-ghost btn-sm">Clear</button>
            </div>
          </div>

          <ol id="queue-list" class="queue-list"></ol>

          <!-- Progress footer (visible during/after batch) -->
          <div class="progress-footer" id="progress-footer" hidden>
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="progress-meta">
              <span id="batch-detail">Idle</span>
              <span id="batch-stats">0/0</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Sticky bottom action bar -->
      <footer class="action-bar" id="action-bar">
        <div class="action-bar-metrics" id="action-metrics" hidden>
          <span class="metric-chip" data-metric="done"><strong id="queue-done">0</strong> done</span>
          <span class="metric-chip" data-metric="failed"><strong id="queue-failed">0</strong> failed</span>
          <span class="metric-chip" data-metric="ready"><strong id="queue-ready">0</strong> ready</span>
        </div>
        <div class="action-bar-buttons">
          <button type="button" id="cancel-batch" class="btn btn-cancel" disabled>Cancel</button>
          <button type="button" id="start-batch" class="btn btn-primary" disabled>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polygon points="4,2 14,8 4,14" fill="currentColor"/></svg>
            Convert
          </button>
        </div>
      </footer>
    </main>

    <!-- Hidden elements for backward compat with summary card IDs -->
    <div hidden>
      <span id="queue-total">0</span>
      <span id="batch-progress-label">0.0%</span>
      <progress id="batch-progress" max="100" value="0"></progress>
    </div>
  </body>
</html>
