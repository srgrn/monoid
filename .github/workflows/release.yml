# Required GitHub Secrets for macOS code signing & notarization:
#   APPLE_CERTIFICATE            — Base64-encoded .p12 certificate
#   APPLE_CERTIFICATE_PASSWORD   — Password for the .p12 certificate
#   APPLE_SIGNING_IDENTITY       — e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_API_ISSUER             — App Store Connect API issuer ID
#   APPLE_API_KEY                — App Store Connect API key ID
#   APPLE_API_KEY_PATH           — Base64-encoded .p8 key file content
#
# Required GitHub Secrets for auto-updater signing:
#   TAURI_SIGNING_PRIVATE_KEY          — Minisign private key (from `tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — Password for the private key

name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    name: Test release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Run JavaScript tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build-linux-cross:
    name: Build on Linux (${{ matrix.name }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            tauri_args: ""
            artifact_path: |
              src-tauri/target/release/bundle/**/*.AppImage
              src-tauri/target/release/bundle/**/*.deb
              src-tauri/target/release/bundle/**/*.rpm
          - name: windows
            tauri_args: "--target x86_64-pc-windows-gnu"
            artifact_path: |
              src-tauri/target/x86_64-pc-windows-gnu/release/bundle/**/*.msi
              src-tauri/target/x86_64-pc-windows-gnu/release/bundle/**/*setup.exe

    steps:
      - name: Check out tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Linux cross-build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            nsis \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build release bundles
        env:
          AR_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc-ar
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm exec tauri build -- ${{ matrix.tauri_args }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monoid-${{ matrix.name }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

  build-macos:
    name: Build on macOS (signed + notarized)
    needs: test
    runs-on: macos-latest

    steps:
      - name: Check out tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Write App Store Connect API key
        run: echo "${{ secrets.APPLE_API_KEY_PATH }}" | base64 --decode > /tmp/AuthKey.p8

      - name: Build, sign, and notarize macOS bundles
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: /tmp/AuthKey.p8
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: monoid-macos-dmg
          if-no-files-found: error
          path: src-tauri/target/release/bundle/**/*.dmg

      - name: Upload macOS updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monoid-macos-updater
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.app.tar.gz.sig

  publish:
    name: Attach artifacts to release
    needs:
      - test
      - build-linux-cross
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: find release-artifacts -type f | sort

      - name: Generate latest.json for auto-updater
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          SIG_FILE=$(find release-artifacts -name '*.app.tar.gz.sig' | head -1)
          TAR_FILE=$(find release-artifacts -name '*.app.tar.gz' ! -name '*.sig' | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$TAR_FILE" ]; then
            SIGNATURE=$(cat "$SIG_FILE")
            TAR_NAME=$(basename "$TAR_FILE")
            cat > release-artifacts/latest.json << EOF
          {
            "version": "${VERSION}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/${TAR_NAME}"
              },
              "darwin-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/${TAR_NAME}"
              }
            }
          }
          EOF
            echo "Generated latest.json for version ${VERSION}"
          else
            echo "Warning: Could not find updater artifacts, skipping latest.json"
          fi

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find release-artifacts -type f -print0 | xargs -0 \
            gh release upload "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" --clobber
