# Required GitHub Secrets for macOS code signing & notarization:
#   APPLE_CERTIFICATE            — Base64-encoded .p12 certificate
#   APPLE_CERTIFICATE_PASSWORD   — Password for the .p12 certificate
#   APPLE_SIGNING_IDENTITY       — e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_API_ISSUER             — App Store Connect API issuer ID
#   APPLE_API_KEY                — App Store Connect API key ID
#   APPLE_API_KEY_PATH           — Base64-encoded .p8 key file content

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Create release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      sha: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Fail if GitHub release already exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.tag }} already exists." >&2
            exit 1
          fi

      - name: Create or update tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push --delete origin "${{ steps.version.outputs.tag }}" >/dev/null 2>&1 || true
          git tag -d "${{ steps.version.outputs.tag }}" >/dev/null 2>&1 || true
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}" "${GITHUB_SHA}"
          git push --force origin "${{ steps.version.outputs.tag }}"

  test:
    name: Test release on Linux
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged release
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Run JavaScript tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build-linux-cross:
    name: Build on Linux (${{ matrix.name }})
    needs:
      - prepare
      - test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            tauri_args: ""
            artifact_path: |
              src-tauri/target/release/bundle/**/*.AppImage
              src-tauri/target/release/bundle/**/*.deb
              src-tauri/target/release/bundle/**/*.rpm
          - name: windows
            tauri_args: "--target x86_64-pc-windows-gnu"
            artifact_path: |
              src-tauri/target/x86_64-pc-windows-gnu/release/bundle/**/*.msi
              src-tauri/target/x86_64-pc-windows-gnu/release/bundle/**/*setup.exe

    steps:
      - name: Check out tagged release
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Linux cross-build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            nsis \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build release bundles
        env:
          AR_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc-ar
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
        run: npm exec tauri build -- ${{ matrix.tauri_args }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monoid-${{ matrix.name }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

  build-macos:
    name: Build on macOS (signed + notarized)
    needs:
      - prepare
      - test
    runs-on: macos-latest

    steps:
      - name: Check out tagged release
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Write App Store Connect API key
        run: echo "${{ secrets.APPLE_API_KEY_PATH }}" | base64 --decode > /tmp/AuthKey.p8

      - name: Build, sign, and notarize macOS bundles
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: /tmp/AuthKey.p8

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monoid-macos
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - test
      - build-linux-cross
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: find release-artifacts -type f | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Monoid ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-artifacts/**/*
